{% extends 'shop/base.html' %}
{% block content %}
    <h1>Вакансии</h1>
    {% for v in vacancies %}
        <div style="padding: 10px; background: #fdfdfd; border: 1px solid #eee; margin-bottom: 10px;">
            <h3>{{ v.title }}</h3>
            <p>{{ v.description }}</p>
        </div>
    {% endfor %}
{% endblock %}
